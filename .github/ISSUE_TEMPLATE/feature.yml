name: Feature request
description: New AWS construct, output format, ingestion source, etc.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What can't netreach evaluate today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed schema / behaviour
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
