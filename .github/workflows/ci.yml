name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build -o netreach ./cmd/netreach
      - run: ./netreach analyze --config testdata/simple.yaml --src eni-web --dst 1.1.1.1 --port 443 --protocol tcp
